# ─────────────────────────────────────────────────────────────────────
# KEY NAMING RULE:
#   Every key here must match the exact parameter name expected by the
#   Python API that consumes it. This way the code can do **cfg["model"]
#   directly — zero remapping needed in Python.
# ─────────────────────────────────────────────────────────────────────

model:
  model_name: "unsloth/mistral-7b-bnb-4bit"  
  max_seq_length: 512                           
  load_in_4bit: true                            
  dtype: null                                  

lora:
  r: 16                                        
  lora_alpha: 16                                
  lora_dropout: 0.05                            
  target_modules: [q_proj, k_proj, v_proj, o_proj]
  bias: "none"
  use_gradient_checkpointing: true

dataset:
  local_path: "med_dataset.json"

  sources:


    - name: "chatdoctor"
      type: "huggingface"
      path: "lavita/ChatDoctor-HealthCareMagic-100k"
      split: "train"
      input_col: "instruction"
      output_col: "output"
      max_samples: 1500
      enabled: true


    - name: "pubmedqa"
      type: "huggingface"
      path: "pubmed_qa"
      config: "pqa_labeled"
      split: "train"
      input_col: "question"
      output_col: "long_answer"
      fallback_context_col: "context"
      fallback_context_key: "contexts"
      max_samples: 700
      enabled: true


    - name: "medmcqa"
      type: "huggingface"
      path: "medmcqa"
      split: "train"
      input_col: "question"
      output_col: "exp"
      correct_idx_col: "cop"
      option_cols: [opa, opb, opc, opd]
      max_samples: 700
      enabled: true


    - name: "flashcards"
      type: "huggingface"
      path: "medalpaca/medical_meadow_medical_flashcards"
      split: "train"
      input_col: "input"
      output_col: "output"
      max_samples: 500
      enabled: true

    - name: "wikidoc"
      type: "huggingface"
      path: "medalpaca/medical_meadow_wikidoc_patient_information"
      split: "train"
      input_col: "input"
      output_col: "output"
      max_samples: 800
      enabled: true

    - name: "medquad"
      type: "huggingface"
      path: "keivalya/MedQuad-MedicalQnADataset"
      split: "train"
      input_col: "Question"
      output_col: "Answer"
      max_samples: 800
      enabled: true


    - name: "local_curated"
      type: "local"
      input_col: "input"
      output_col: "output"
      instruction_col: "instruction"
      enabled: true

  total_cap: 5000
  val_split: 0.05
  seed: 42
  instruction_variants:
    - "Explain this medical term in simple plain English"
    - "What does this medical term mean in everyday language?"
    - "Describe this medical condition as if explaining to a patient with no medical background"
    - "Simplify this medical term for someone with no medical knowledge"
    - "Answer this medical question clearly and concisely"
    - "Provide a patient-friendly explanation for the following"

training:

  output_dir: "outputs/checkpoints"
  num_train_epochs: 1                          
  max_steps: 500
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"                   
  warmup_steps: 20
  logging_steps: 25
  optim: "adamw_8bit"
  fp16: true
  bf16: false
  eval_strategy: "epoch"
  save_strategy: "no"
  report_to: "none"
  seed: 42

inference:

  max_new_tokens: 200
  do_sample: false
  temperature: 1.0
  repetition_penalty: 1.1

export:
  lora_dir: "outputs/lora_adapter"
  push_to_hub: true
  hub_model_id: "Akhilesh-2308/Medical-Term_simplifier"
  hub_token_env: "HF_TOKEN"
